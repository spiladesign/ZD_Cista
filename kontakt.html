<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt — ZD Čistá u Mladé Boleslavi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A2A2A; -webkit-font-smoothing: antialiased; }
input, textarea, select { font-family: 'Inter', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.js"></script>
<script type="text/babel">

const KontaktForm = () => {
  const [form, setForm] = React.useState({ jmeno: '', email: '', tel: '', zprava: '' });
  const [sent, setSent] = React.useState(false);
  const [loading, setLoading] = React.useState(false);

  const handle = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));

  const submit = e => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); setSent(true); }, 1200);
  };

  const inputStyle = {
    width: '100%', padding: '12px 14px', border: '1px solid #ddd8d0',
    borderRadius: 8, fontSize: 15, color: '#2A2A2A', background: 'white',
    outline: 'none', transition: 'border-color 0.2s',
  };

  const labelStyle = { fontSize: 13, fontWeight: 600, color: '#555', display: 'block', marginBottom: 6 };

  if (sent) return (
    <div style={{ textAlign: 'center', padding: '48px 32px', background: '#e8f4e0', borderRadius: 14 }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>✓</div>
      <div style={{ fontWeight: 700, fontSize: 20, color: ZD_COLORS.green, marginBottom: 8 }}>Zpráva odeslána!</div>
      <p style={{ fontSize: 15, color: '#555' }}>Děkujeme za váš dotaz. Ozveme se vám co nejdříve.</p>
    </div>
  );

  return (
    <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }} className="resp-2col-form">
        <div>
          <label style={labelStyle}>Jméno a příjmení *</label>
          <input required name="jmeno" value={form.jmeno} onChange={handle}
            placeholder="Jan Novák" style={inputStyle}
            onFocus={e => e.target.style.borderColor = ZD_COLORS.green}
            onBlur={e => e.target.style.borderColor = '#ddd8d0'}
          />
        </div>
        <div>
          <label style={labelStyle}>E-mailová adresa *</label>
          <input required type="email" name="email" value={form.email} onChange={handle}
            placeholder="jan@example.cz" style={inputStyle}
            onFocus={e => e.target.style.borderColor = ZD_COLORS.green}
            onBlur={e => e.target.style.borderColor = '#ddd8d0'}
          />
        </div>
      </div>
      <div>
        <label style={labelStyle}>Telefon</label>
        <input name="tel" value={form.tel} onChange={handle}
          placeholder="+420 600 000 000" style={inputStyle}
          onFocus={e => e.target.style.borderColor = ZD_COLORS.green}
          onBlur={e => e.target.style.borderColor = '#ddd8d0'}
        />
      </div>
      <div>
        <label style={labelStyle}>Zpráva *</label>
        <textarea required name="zprava" value={form.zprava} onChange={handle}
          placeholder="Váš dotaz nebo zpráva..." rows={6}
          style={{ ...inputStyle, resize: 'vertical', lineHeight: 1.6 }}
          onFocus={e => e.target.style.borderColor = ZD_COLORS.green}
          onBlur={e => e.target.style.borderColor = '#ddd8d0'}
        />
      </div>
      <div style={{ fontSize: 12, color: '#aaa' }}>* Povinná pole. Vaše údaje použijeme pouze pro odpověď na váš dotaz.</div>
      <button type="submit" disabled={loading} style={{
        padding: '14px 28px', background: ZD_COLORS.green, color: 'white',
        border: 'none', borderRadius: 8, fontSize: 15, fontWeight: 700,
        cursor: loading ? 'wait' : 'pointer', transition: 'background 0.2s',
        display: 'flex', alignItems: 'center', gap: 8, width: 'fit-content',
      }}
      onMouseEnter={e => { if (!loading) e.currentTarget.style.background = ZD_COLORS.greenLight; }}
      onMouseLeave={e => e.currentTarget.style.background = ZD_COLORS.green}
      >
        {loading ? 'Odesílám...' : <>Odeslat zprávu <IcoArrow /></>}
      </button>
    </form>
  );
};

const Kontakt = () => (
  <>
    <ZDHeader activePage="kontakt.html" variant="light" />
    <ZDPageHero
      title="Kontakt"
      subtitle="Neváhejte nás kontaktovat. Odpovíme vám co nejdříve."
    />

    <section style={{ padding: '80px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1.4fr', gap: 64, alignItems: 'start' }} className="resp-2col">

        {/* Kontaktní info */}
        <div>
          <div style={{ fontWeight: 700, fontSize: 20, marginBottom: 24, letterSpacing: '-0.3px' }}>ZD Čistá u Mladé Boleslavi</div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginBottom: 32 }}>
            {[
              { icon: <IcoPin />, label: 'Adresa', val: 'Čistá 173\n294 23 Čistá u Mladé Boleslavi' },
              { icon: <IcoPhone />, label: 'Telefon', val: '601 576 687' },
              { icon: <IcoMail />, label: 'E-mail', val: 'info@zdcista.cz' },
              { icon: <IcoClock />, label: 'Úřední hodiny', val: 'Po–Pá 7:00–15:00' },
            ].map((c, i) => (
              <div key={i} style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: '#F0EBE1', display: 'flex', alignItems: 'center', justifyContent: 'center', color: ZD_COLORS.green, flexShrink: 0 }}>{c.icon}</div>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 4 }}>{c.label}</div>
                  <div style={{ fontSize: 15, fontWeight: 600, whiteSpace: 'pre-line', lineHeight: 1.6 }}>{c.val}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Identifikace */}
          <div style={{ background: '#F0EBE1', borderRadius: 12, padding: '20px 22px' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 14 }}>Identifikační údaje</div>
            {[['IČO','00105368'],['DIČ','CZ00105368'],['Právní forma','Zemědělské družstvo']].map(([k,v]) => (
              <div key={k} style={{ display: 'flex', gap: 12, fontSize: 14, marginBottom: 8 }}>
                <span style={{ color: '#aaa', width: 70 }}>{k}</span>
                <span style={{ fontWeight: 600 }}>{v}</span>
              </div>
            ))}
          </div>

          {/* Mapa */}
          <ZDImg label={"mapa / Google Maps embed\nČistá u Mladé Boleslavi"} style={{ height: 200, borderRadius: 12, marginTop: 20, background: 'linear-gradient(135deg, #b8c8a0 0%, #8aa060 100%)' }} />
          <a href="https://www.google.cz/maps/@50.476478,14.844644,3a,75y" target="_blank" rel="noopener noreferrer"
            style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginTop: 10, fontSize: 13, fontWeight: 600, color: ZD_COLORS.green, textDecoration: 'none' }}>
            <IcoMap /> Otevřít v Google Maps
          </a>
        </div>

        {/* Formulář */}
        <div style={{ background: 'white', borderRadius: 16, padding: '36px 32px', boxShadow: '0 4px 24px rgba(0,0,0,0.08)' }}>
          <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 24, letterSpacing: '-0.3px' }}>Napište nám</div>
          <KontaktForm />
        </div>
      </div>
    </section>

    <ZDFooter />
    <style>{`@media(max-width:768px){.resp-2col{grid-template-columns:1fr!important}.resp-2col-form{grid-template-columns:1fr!important}}`}</style>
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Kontakt />);
</script>
</body>
</html>
