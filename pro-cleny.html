<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro členy — ZD Čistá u Mladé Boleslavi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A2A2A; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.js"></script>
<script type="text/babel">

const program = [
  'Zahájení',
  'Procedurální záležitosti',
  'Volba mandátové a volební komise',
  'Schválení výše základního členského vkladu pro společnost Farma Chyše s.r.o.',
  'Odvolání stávajícího představenstva',
  'Hlasování o změně stanov',
  'Volby do představenstva a Kontrolní komise',
  'Zpráva o činnosti představenstva v roce 2025',
  'Výroční zpráva, účetní závěrka 2025',
  'Zpráva kontrolní komise',
  'Vyhlášení výsledků voleb',
  'Schválení účetní závěrky za rok 2025',
  'Schválení zástupce do obchodních korporací a zájmových spolků',
  'Diskuze, usnesení, závěr',
];

const dokumenty = [
  {
    kategorie: 'Stanovy',
    items: [
      { nazev: 'Stanovy ZD Čistá — platné znění', rok: '2026', typ: 'PDF' },
      { nazev: 'Návrh změn stanov 2026', rok: '2026', typ: 'PDF' },
    ],
  },
  {
    kategorie: 'Výroční zprávy',
    items: [
      { nazev: 'Výroční zpráva 2025', rok: '2025', typ: 'PDF' },
      { nazev: 'Výroční zpráva 2024', rok: '2024', typ: 'PDF' },
      { nazev: 'Výroční zpráva 2023', rok: '2023', typ: 'PDF' },
    ],
  },
  {
    kategorie: 'Účetní závěrky',
    items: [
      { nazev: 'Účetní závěrka 2025', rok: '2025', typ: 'PDF' },
      { nazev: 'Účetní závěrka 2024', rok: '2024', typ: 'PDF' },
      { nazev: 'Účetní závěrka 2023', rok: '2023', typ: 'PDF' },
    ],
  },
  {
    kategorie: 'Zápisy ze schůzí',
    items: [
      { nazev: 'Zápis z členské schůze 18. 3. 2026', rok: '2026', typ: 'PDF' },
      { nazev: 'Zápis z členské schůze 2025', rok: '2025', typ: 'PDF' },
    ],
  },
];

const DokumentRow = ({ item }) => {
  const [hov, setHov] = React.useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        display: 'flex', alignItems: 'center', gap: 14, padding: '14px 20px',
        background: hov ? '#f8f4ee' : 'white', borderRadius: 10,
        border: '1px solid #ede8e0', transition: 'all 0.2s', cursor: 'pointer',
        marginBottom: 8,
      }}>
      <div style={{ color: ZD_COLORS.green, flexShrink: 0 }}><IcoDoc /></div>
      <div style={{ flex: 1 }}>
        <div style={{ fontWeight: 600, fontSize: 14 }}>{item.nazev}</div>
        <div style={{ fontSize: 12, color: '#999', marginTop: 2 }}>{item.typ} · {item.rok}</div>
      </div>
      <button style={{
        display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px',
        background: hov ? ZD_COLORS.green : '#F0EBE1', color: hov ? 'white' : ZD_COLORS.green,
        border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',
        transition: 'all 0.2s',
      }}>
        <IcoDown /> Stáhnout
      </button>
    </div>
  );
};

const ProCleny = () => (
  <>
    <ZDHeader activePage="pro-cleny.html" variant="light" />
    <ZDPageHero
      title="Pro členy"
      subtitle="Informace představenstva, pozvánky na schůze a dokumenty ke stažení pro členy ZD Čistá."
    />

    {/* AKTUÁLNÍ INFORMACE PŘEDSTAVENSTVA */}
    <section style={{ padding: '72px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Informace představenstva" title="Aktuální oznámení" />

        {/* Pozvánka - highlighted card */}
        <div style={{
          background: 'white', borderRadius: 16, overflow: 'hidden',
          boxShadow: '0 4px 24px rgba(0,0,0,0.08)', marginBottom: 32,
          border: `2px solid ${ZD_COLORS.wheat}`,
        }}>
          <div style={{ background: ZD_COLORS.green, padding: '20px 32px', display: 'flex', alignItems: 'center', gap: 12 }}>
            <IcoCal />
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '1px', textTransform: 'uppercase', color: ZD_COLORS.wheat }}>Aktuální pozvánka</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: 'white' }}>Členská schůze — 18. 3. 2026</div>
            </div>
          </div>
          <div style={{ padding: '28px 32px' }}>
            <p style={{ fontSize: 16, lineHeight: 1.75, marginBottom: 20, color: '#444' }}>
              <strong>Představenstvo Zemědělského družstva Čistá u Mladé Boleslavi</strong> svolává dle zákona č. 90/2012 Sb. <strong>Členskou schůzi</strong>, která se bude konat ve středu <strong>18. 3. 2026 od 17:00 hodin</strong> v Kulturním domě v Čisté, Čistá 195, 294 23 Čistá u Mladé Boleslavi.
            </p>

            <div style={{ background: '#FAF7F2', borderRadius: 12, padding: '20px 24px', marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: ZD_COLORS.green, letterSpacing: '1px', textTransform: 'uppercase', marginBottom: 14 }}>Program schůze</div>
              <ol style={{ paddingLeft: 20 }}>
                {program.map((bod, i) => (
                  <li key={i} style={{ fontSize: 14, color: '#555', lineHeight: 1.7, marginBottom: 6 }}>
                    {bod}
                  </li>
                ))}
              </ol>
            </div>

            <div style={{ background: '#fffbf4', border: `1px solid ${ZD_COLORS.wheat}40`, borderRadius: 10, padding: '14px 18px', marginBottom: 20, fontSize: 14, color: '#666', lineHeight: 1.65 }}>
              <strong>Součástí pozvánky je návrh změn Stanov.</strong> S podklady k jednotlivým bodům programu členské schůze je možné se seznámit v sídle družstva v pracovních dnech v době od 7:00 do 15:00 hod.
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 12, paddingTop: 16, borderTop: '1px solid #f0ebe1' }}>
              <ZDImg label="foto" style={{ width: 48, height: 48, borderRadius: '50%', background: '#e8f0e0', flexShrink: 0 }} />
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>Tomáš Bartoš</div>
                <div style={{ fontSize: 12, color: '#888' }}>Předseda představenstva ZD Čistá</div>
              </div>
            </div>
          </div>
        </div>

        {/* Info o přístupu */}
        <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start', background: '#e8f4e0', borderRadius: 10, padding: '14px 18px', fontSize: 14, color: '#3a5a1a' }}>
          <IcoInfo style={{ flexShrink: 0, marginTop: 1 }} />
          <span>Starší oznámení a zápisy ze schůzí naleznete níže v sekci Dokumenty ke stažení.</span>
        </div>
      </div>
    </section>

    {/* DOKUMENTY KE STAŽENÍ */}
    <section style={{ padding: '72px 24px', background: '#F0EBE1' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Dokumenty ke stažení" title="Stanovy, zprávy a zápisy" />

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: 24 }}>
          {dokumenty.map((skupina, i) => (
            <div key={i} style={{ background: 'white', borderRadius: 14, padding: '24px 24px 20px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: ZD_COLORS.green, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
                <IcoDoc /> {skupina.kategorie}
              </div>
              {skupina.items.map((item, j) => <DokumentRow key={j} item={item} />)}
            </div>
          ))}
        </div>

        <div style={{ marginTop: 24, background: 'white', borderRadius: 12, padding: '18px 22px', fontSize: 14, color: '#666', border: '1px solid #ede8e0' }}>
          <strong>Fyzické nahlédnutí do dokumentů:</strong> V sídle družstva v pracovních dnech od 7:00 do 15:00. Adresa: Čistá 173, 294 23 Čistá u Mladé Boleslavi.
        </div>
      </div>
    </section>

    {/* Kontakt na vedení */}
    <section style={{ padding: '72px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 20 }}>
        {[
          { icon: <IcoPhone />, title: 'Telefonní kontakt', val: '601 576 687', sub: 'Pracovní dny 7:00–15:00' },
          { icon: <IcoMail />, title: 'E-mailový kontakt', val: 'info@zdcista.cz', sub: 'Odpovídáme do 2 pracovních dnů' },
          { icon: <IcoPin />, title: 'Sídlo družstva', val: 'Čistá 173', sub: '294 23 Čistá u Mladé Boleslavi' },
        ].map((c, i) => (
          <div key={i} style={{ background: 'white', borderRadius: 14, padding: '24px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', display: 'flex', gap: 14, alignItems: 'flex-start' }}>
            <div style={{ color: ZD_COLORS.green, marginTop: 2 }}>{c.icon}</div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>{c.title}</div>
              <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4 }}>{c.val}</div>
              <div style={{ fontSize: 13, color: '#888' }}>{c.sub}</div>
            </div>
          </div>
        ))}
      </div>
    </section>

    <ZDFooter />
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<ProCleny />);
</script>
</body>
</html>
