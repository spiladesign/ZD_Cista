<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZD Čistá u Mladé Boleslavi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A2A2A; line-height: 1.6; -webkit-font-smoothing: antialiased; }

:root {
  --green: #2D5016;
  --green-light: #3a6620;
  --wheat: #D4A574;
  --rust: #A0522D;
  --cream: #FAF7F2;
  --cream-dark: #F0EBE1;
  --text: #2A2A2A;
  --text-muted: #6B6B6B;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.1);
}

#root { min-height: 100vh; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--wheat); border-radius: 3px; }

/* Image placeholder */
.img-placeholder {
  background: #d4cfc5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.img-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.15) 20px,
    rgba(255,255,255,0.15) 22px
  );
}
.img-placeholder span {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: rgba(42,42,42,0.55);
  text-align: center;
  padding: 4px 10px;
  background: rgba(255,255,255,0.5);
  border-radius: 4px;
  position: relative;
  z-index: 1;
  line-height: 1.5;
  max-width: 200px;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#2D5016",
  "wheatColor": "#D4A574",
  "heroStyle": "dark-overlay",
  "showStats": true,
  "borderRadius": 8
}/*EDITMODE-END*/;

// ── SVG Icons ──────────────────────────────────────────────────────────────
const IconMenu = () => (

  </svg>
);

  </svg>
);
const IconArrow = ({ dir = 'right' }) => (

  </svg>

const IconPhone = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.82 9.72 19.79 19.79 0 01.77 1.14 2 2 0 012.76 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.93 7.91a16 16 0 006.16 6.16l1.27-1.27a2 2 0 012.11-.45c.9.31 1.84.52 2.81.7A2 2 0 0122 14.92z"/>
  </svg>
);
const IconMail = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
    <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
  </svg>
);
const IconTractor = () => (
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
    <circle cx="7" cy="17" r="3"/><circle cx="17" cy="18" r="2"/>
    <path d="M10 17h4.5l2.5-4-3-4H8V17M4 17H2V9h6"/>
    <path d="M14 9V7h3l2 4"/>
  </svg>
);
const IconWheat = () => (
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
    <path d="M12 22V6M12 6C12 6 8 4 8 8s4 4 4 4M12 6c0 0 4-2 4 2s-4 4-4 4M12 14c0 0-4-2-4 2s4 4 4 4M12 14c0 0 4-2 4 2s-4 4-4 4"/>
  </svg>
);
const IconPeople = () => (
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 00-3-3.87"/>
    <path d="M16 3.13a4 4 0 010 7.75"/>
  </svg>
);
const IconLeaf = () => (
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
    <path d="M2 22c0 0 4-10 12-12C20 8 22 2 22 2s-2 8-8 12C8 18 2 22 2 22z"/>
    <path d="M2 22L12 12"/>
  </svg>
);
const IconCow = () => (
  <svg width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="currentColor" strokeWidth="1.5">
    <ellipse cx="16" cy="20" rx="9" ry="6"/>
    <circle cx="11" cy="13" r="3"/>
    <circle cx="21" cy="13" r="3"/>
    <path d="M9 10l-2-3M23 10l2-3M13 26v3M19 26v3M8 17l-3 2M24 17l3 2"/>
  </svg>
);
const IconCalendar = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
);
const IconEU = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 2a14.5 14.5 0 010 20M2 12h20"/>
  </svg>
);
const IconBuild = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
    <rect x="3" y="9" width="18" height="13" rx="1"/>
    <path d="M1 9l11-7 11 7"/>
    <path d="M9 22V13h6v9"/>
  </svg>
);
const IconCookie = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
    <circle cx="12" cy="12" r="10"/>
    <circle cx="8" cy="10" r="1" fill="currentColor"/>
    <circle cx="14" cy="8" r="1" fill="currentColor"/>
    <circle cx="10" cy="15" r="1" fill="currentColor"/>
    <circle cx="16" cy="14" r="1" fill="currentColor"/>
  </svg>
);

// ── Image Placeholder ──────────────────────────────────────────────────────
const ImgPlaceholder = ({ label, style = {}, className = '' }) => (
  <div className={`img-placeholder ${className}`} style={style}>
    <span>{label}</span>
  </div>
);

// ── Header ─────────────────────────────────────────────────────────────────
const Header = ({ tweaks }) => {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [activeSection, setActiveSection] = useState('');

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const navLinks = [
    { label: 'O nás', href: 'o-nas.html' },
    { label: 'Naše činnost', href: 'cinnost.html' },
    { label: 'Pro členy', href: 'pro-cleny.html' },
    { label: 'Projekty', href: 'projekty.html' },
    { label: 'Pro veřejnost', href: 'pro-verejnost.html' },
    { label: 'Kontakt', href: 'kontakt.html' },
  ];

  const scrollTo = (href, e) => {
    e.preventDefault();
    setMenuOpen(false);
    const el = document.querySelector(href);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  };

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'rgba(250,247,242,0.97)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      boxShadow: scrolled ? '0 1px 20px rgba(0,0,0,0.08)' : 'none',
      transition: 'all 0.3s ease',
      borderBottom: scrolled ? '1px solid rgba(212,165,116,0.2)' : 'none',
    }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto', padding: '0 24px',
        height: 72, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        {/* Logo */}
        <a href="#" onClick={e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
          style={{ textDecoration: 'none', display: 'flex', alignItems: 'center' }}>
          {/* Logo — originální SVG */}
          <img
            src={scrolled ? "uploads/logo1.svg" : "uploads/logo3.svg"}
            alt="ZD Čistá – Zemědělské družstvo"
            style={{ height: 46, width: 'auto', display: 'block', transition: 'opacity 0.3s' }}
          />
        </a>

        {/* Desktop Nav */}
        <nav style={{ display: 'flex', gap: 4, alignItems: 'center' }} className="desktop-nav">
          {navLinks.map(link => (
            <a key={link.href} href={link.href} style={{
              padding: '8px 14px', textDecoration: 'none', fontSize: 14, fontWeight: 500,
              color: scrolled ? '#2A2A2A' : 'rgba(255,255,255,0.9)',
              borderRadius: 6, transition: 'all 0.2s',
              ':hover': { background: 'rgba(45,80,22,0.1)' }
            }}
            onMouseEnter={e => e.target.style.background = scrolled ? 'rgba(45,80,22,0.08)' : 'rgba(255,255,255,0.12)'}
            onMouseLeave={e => e.target.style.background = 'transparent'}
            >{link.label}</a>
          ))}
          <a href="pro-cleny.html" style={{
            marginLeft: 8, padding: '9px 20px', background: tweaks.accentColor,
            color: 'white', textDecoration: 'none', fontSize: 14, fontWeight: 600,
            borderRadius: 6, transition: 'all 0.2s',
          }}
          onMouseEnter={e => e.target.style.background = '#3a6620'}
          onMouseLeave={e => e.target.style.background = tweaks.accentColor}
          >Pro členy</a>
        </nav>

        {/* Mobile Hamburger */}
        <button onClick={() => setMenuOpen(!menuOpen)} className="mobile-menu-btn"
          style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4,
            color: scrolled ? '#2A2A2A' : 'white', display: 'none' }}>
          {menuOpen ? <IconX /> : <IconMenu />}
        </button>
      </div>

      {/* Mobile Menu */}
      {menuOpen && (
        <div style={{
          background: 'white', borderTop: '1px solid #f0ebe1',
          padding: '16px 24px 24px',
          boxShadow: '0 8px 30px rgba(0,0,0,0.1)',
        }}>
          {navLinks.map(link => (
            <a key={link.href} href={link.href} style={{
              display: 'block', padding: '12px 0', textDecoration: 'none',
              color: '#2A2A2A', fontSize: 16, fontWeight: 500,
              borderBottom: '1px solid #f0ebe1',
            }}>{link.label}</a>
          ))}
          <a href="pro-cleny.html" style={{
            display: 'block', marginTop: 16, padding: '12px 20px', background: tweaks.accentColor,
            color: 'white', textDecoration: 'none', fontSize: 15, fontWeight: 600,
            borderRadius: 6, textAlign: 'center',
          }}>Pro členy →</a>
        </div>
      )}
    </header>
  );
};

// ── Hero ───────────────────────────────────────────────────────────────────
const Hero = ({ tweaks }) => {
  const scrollTo = href => {
    const el = document.querySelector(href);
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
  };

  return (
    <section style={{ position: 'relative', height: '100vh', minHeight: 600, overflow: 'hidden' }}>
      {/* BG Image */}
      <img
        src="uploads/Gemini_Generated_Image_5oxkg85oxkg85oxk.png"
        alt="Letecký pohled na zemědělskou krajinu při ranním světle"
        style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%',
          objectFit: 'cover', objectPosition: 'center 40%',
        }}
      />
      {/* Overlay */}
      <div style={{
        position: 'absolute', inset: 0,
        background: tweaks.heroStyle === 'dark-overlay'
          ? 'linear-gradient(to right, rgba(20,35,8,0.78) 0%, rgba(20,35,8,0.45) 60%, rgba(20,35,8,0.15) 100%)'
          : 'linear-gradient(to top, rgba(20,35,8,0.85) 0%, rgba(20,35,8,0.2) 100%)',
      }}/>

      {/* Content */}
      <div style={{
        position: 'relative', zIndex: 2, maxWidth: 1200, margin: '0 auto',
        padding: '0 24px', height: '100%',
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
      }}>
        <div style={{ maxWidth: 620 }}>
          {/* Tag */}
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            background: 'rgba(212,165,116,0.2)', border: '1px solid rgba(212,165,116,0.4)',
            padding: '6px 14px', borderRadius: 20, marginBottom: 24,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: tweaks.wheatColor }}/>
            <span style={{ fontSize: 12, color: tweaks.wheatColor, fontWeight: 600, letterSpacing: '1px', textTransform: 'uppercase' }}>
              Středočeský kraj
            </span>
          </div>

          <h1 style={{
            fontSize: 'clamp(44px, 7vw, 80px)', fontWeight: 800, color: 'white',
            lineHeight: 1.05, letterSpacing: '-2px', marginBottom: 24,
            textWrap: 'balance',
          }}>
            Tradice,<br/>půda, lidé
          </h1>
          <p style={{
            fontSize: 'clamp(16px, 2vw, 19px)', color: 'rgba(255,255,255,0.82)',
            lineHeight: 1.65, marginBottom: 40, fontWeight: 400, maxWidth: 500,
          }}>
            Zemědělské družstvo Čistá u Mladé Boleslavi hospodaří ve Středočeském kraji již od roku 1950.
            Zaměřujeme se na rostlinnou a živočišnou výrobu.
          </p>

          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <a href="pro-cleny.html" style={{
              padding: '14px 28px', background: tweaks.accentColor,
              color: 'white', border: 'none', borderRadius: tweaks.borderRadius,
              fontSize: 15, fontWeight: 600, cursor: 'pointer', textDecoration: 'none',
              transition: 'all 0.2s', display: 'flex', alignItems: 'center', gap: 8,
            }}
            onMouseEnter={e => e.currentTarget.style.background = '#3a6620'}
            onMouseLeave={e => e.currentTarget.style.background = tweaks.accentColor}
            >
              Pro členy družstva <IconArrow />
            </a>
            <a href="kontakt.html" style={{
              padding: '14px 28px', background: 'rgba(255,255,255,0.12)',
              color: 'white', border: '1.5px solid rgba(255,255,255,0.35)',
              borderRadius: tweaks.borderRadius, fontSize: 15, fontWeight: 600, textDecoration: 'none',
              cursor: 'pointer', transition: 'all 0.2s', backdropFilter: 'blur(4px)',
              display: 'flex', alignItems: 'center', gap: 8,
            }}
            onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.22)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.6)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.12)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.35)'; }}
            >
              Kontaktujte nás
            </a>
          </div>
        </div>

        {/* Bottom scroll indicator */}
        <div style={{
          position: 'absolute', bottom: 32, left: '50%', transform: 'translateX(-50%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
        }}>
          <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', letterSpacing: '1px', textTransform: 'uppercase' }}>Přejděte níže</span>
          <div style={{
            width: 24, height: 38, border: '1.5px solid rgba(255,255,255,0.3)', borderRadius: 12,
            display: 'flex', justifyContent: 'center', paddingTop: 6,
          }}>
            <div style={{
              width: 4, height: 8, background: 'rgba(255,255,255,0.5)', borderRadius: 2,
              animation: 'scrollBounce 1.5s ease-in-out infinite',
            }}/>
          </div>
        </div>
      </div>

      <style>{`
        @keyframes scrollBounce {
          0%, 100% { transform: translateY(0); opacity: 0.5; }
          50% { transform: translateY(8px); opacity: 1; }
        }
      `}</style>
    </section>
  );
};

// ── Stats Bar ──────────────────────────────────────────────────────────────
const StatsBar = ({ tweaks }) => {
  const stats = [
    { icon: <IconTractor />, value: '1950+', label: 'Rok založení' },
    { icon: <IconWheat />, value: '850 ha', label: 'Obhospodařované plochy' },
    { icon: <IconPeople />, value: '45', label: 'Zaměstnanců' },
  ];
  if (!tweaks.showStats) return null;

  return (
    <div style={{
      background: tweaks.accentColor, color: 'white',
      padding: '40px 24px',
    }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto',
        display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
        gap: 0,
      }}>
        {stats.map((s, i) => (
          <div key={i} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            padding: '16px 24px',
            borderRight: i < stats.length - 1 ? '1px solid rgba(255,255,255,0.2)' : 'none',
            gap: 8,
          }}>
            <div style={{ opacity: 0.7 }}>{s.icon}</div>
            <div style={{ fontSize: 36, fontWeight: 800, letterSpacing: '-1px', lineHeight: 1 }}>{s.value}</div>
            <div style={{ fontSize: 13, opacity: 0.75, fontWeight: 500, textAlign: 'center', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── About ──────────────────────────────────────────────────────────────────
const About = ({ tweaks }) => (
  <section id="o-nas" style={{ padding: '100px 24px', background: '#FAF7F2' }}>
    <div style={{
      maxWidth: 1200, margin: '0 auto',
      display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center',
    }} className="about-grid">
      <div>
        <div style={{
          display: 'inline-block', fontSize: 11, fontWeight: 700, letterSpacing: '2px',
          textTransform: 'uppercase', color: tweaks.accentColor, marginBottom: 16,
          borderBottom: `2px solid ${tweaks.wheatColor}`, paddingBottom: 4,
        }}>O nás</div>
        <h2 style={{
          fontSize: 'clamp(32px, 4vw, 46px)', fontWeight: 800, lineHeight: 1.15,
          letterSpacing: '-1px', marginBottom: 24, color: '#2A2A2A',
        }}>O&nbsp;družstvu</h2>
        <p style={{ fontSize: 17, lineHeight: 1.75, color: '#555', marginBottom: 24 }}>
          Zemědělské družstvo Čistá u Mladé Boleslavi sdružuje hospodáře a zaměstnance regionu
          už desítky let. Spojujeme tradiční zemědělské hodnoty s moderním přístupem k výrobě
          a péči o krajinu.
        </p>
        <p style={{ fontSize: 17, lineHeight: 1.75, color: '#555', marginBottom: 36 }}>
          Naším cílem je udržitelné hospodaření, které respektuje půdu i místní komunitu.
          Pracujeme s nejmodernější technikou a zároveň ctíme odkaz předchozích generací.
        </p>
        <button style={{
          padding: '12px 24px', background: 'transparent',
          color: tweaks.accentColor, border: `1.5px solid ${tweaks.accentColor}`,
          borderRadius: tweaks.borderRadius, fontSize: 14, fontWeight: 600,
          cursor: 'pointer', transition: 'all 0.2s', display: 'flex', alignItems: 'center', gap: 8,
        }}
        onMouseEnter={e => { e.currentTarget.style.background = tweaks.accentColor; e.currentTarget.style.color = 'white'; }}
        onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = tweaks.accentColor; }}
        >
          Více o historii <IconArrow />
        </button>
      </div>

                <span style={{ color: 'rgba(255,255,255,0.4)', width: 80 }}>{k}</span>
                <span style={{ color: 'rgba(255,255,255,0.75)', fontWeight: 500 }}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Quick Links */}
        <div>
          <h4 style={{ fontSize: 13, fontWeight: 700, letterSpacing: '1.5px', textTransform: 'uppercase', color: tweaks.wheatColor, marginBottom: 20 }}>Navigace</h4>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {['O nás', 'Naše činnost', 'Pro členy', 'Projekty', 'Kontakt'].map(item => (
              <a key={item} href="#" style={{
                fontSize: 14, color: 'rgba(255,255,255,0.6)', textDecoration: 'none',
                transition: 'color 0.2s',
              }}
              onMouseEnter={e => e.target.style.color = tweaks.wheatColor}
              onMouseLeave={e => e.target.style.color = 'rgba(255,255,255,0.6)'}
              >{item}</a>
            ))}
          </div>
        </div>
      </div>

      {/* Bottom bar */}
      <div style={{
        borderTop: '1px solid rgba(255,255,255,0.08)', paddingTop: 28,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12,
      }}>
        <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)' }}>
          © 2025 Zemědělské družstvo Čistá u Mladé Boleslavi. Všechna práva vyhrazena.
        </span>
        <div style={{ display: 'flex', gap: 20 }}>
          {['Ochrana osobních údajů', 'Cookies'].map(t => (
            <a key={t} href="#" style={{ fontSize: 13, color: 'rgba(255,255,255,0.35)', textDecoration: 'none' }}
            onMouseEnter={e => e.target.style.color = tweaks.wheatColor}
            onMouseLeave={e => e.target.style.color = 'rgba(255,255,255,0.35)'}
            >{t}</a>
          ))}
        </div>
      </div>
    </div>
  </footer>
);

// ── Cookie Banner ──────────────────────────────────────────────────────────
const CookieBanner = ({ tweaks }) => {
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const accepted = localStorage.getItem('zdcista-cookies');
    if (!accepted) setVisible(true);
  }, []);

  const accept = () => { localStorage.setItem('zdcista-cookies', '1'); setVisible(false); };
  const decline = () => { localStorage.setItem('zdcista-cookies', '0'); setVisible(false); };

  if (!visible) return null;

  return (
    <div style={{
      position: 'fixed', bottom: 20, left: '50%', transform: 'translateX(-50%)',
      maxWidth: 560, width: 'calc(100% - 40px)',
      background: 'rgba(26,42,10,0.97)', backdropFilter: 'blur(16px)',
      borderRadius: 12, padding: '18px 20px',
      boxShadow: '0 8px 40px rgba(0,0,0,0.25)',
      zIndex: 999, display: 'flex', alignItems: 'center', gap: 16,
      border: '1px solid rgba(212,165,116,0.2)',
    }}>
      <span style={{ color: tweaks.wheatColor, flexShrink: 0 }}><IconCookie /></span>
      <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)', flex: 1, lineHeight: 1.5 }}>
        Používáme cookies pro zlepšení funkčnosti webu. Váš souhlas nám pomáhá zlepšovat naše služby.
      </p>
      <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
        <button onClick={decline} style={{
          padding: '8px 14px', background: 'transparent', border: '1px solid rgba(255,255,255,0.2)',
          color: 'rgba(255,255,255,0.6)', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 500,
        }}>Odmítnout</button>
        <button onClick={accept} style={{
          padding: '8px 16px', background: tweaks.accentColor, border: 'none',
          color: 'white', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 600,
        }}>Přijmout</button>
      </div>
    </div>
  );
};

// ── Tweaks Panel ───────────────────────────────────────────────────────────
const TweaksPanel = ({ tweaks, setTweaks, visible }) => {
  if (!visible) return null;
  const update = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  return (
    <div style={{
      position: 'fixed', bottom: 80, right: 20, zIndex: 9999,
      background: 'white', borderRadius: 12, padding: 20, width: 260,
      boxShadow: '0 8px 40px rgba(0,0,0,0.14)', border: '1px solid #e8e0d4',
    }}>
      <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 16, color: '#2A2A2A', letterSpacing: '-0.2px' }}>Tweaks</div>

      <label style={{ fontSize: 12, color: '#888', display: 'block', marginBottom: 6 }}>Hlavní barva</label>
      <input type="color" value={tweaks.accentColor} onChange={e => update('accentColor', e.target.value)}
        style={{ width: '100%', height: 36, border: 'none', borderRadius: 6, cursor: 'pointer', marginBottom: 14 }} />

      <label style={{ fontSize: 12, color: '#888', display: 'block', marginBottom: 6 }}>Pšeničná barva</label>
      <input type="color" value={tweaks.wheatColor} onChange={e => update('wheatColor', e.target.value)}
        style={{ width: '100%', height: 36, border: 'none', borderRadius: 6, cursor: 'pointer', marginBottom: 14 }} />

      <label style={{ fontSize: 12, color: '#888', display: 'block', marginBottom: 6 }}>Styl hero sekce</label>
      <select value={tweaks.heroStyle} onChange={e => update('heroStyle', e.target.value)}
        style={{ width: '100%', padding: '8px 10px', borderRadius: 6, border: '1px solid #e0d8ce', fontSize: 13, marginBottom: 14, background: 'white' }}>
        <option value="dark-overlay">Tmavý overlay vlevo</option>
        <option value="gradient-up">Gradient zespoda</option>
      </select>

      <label style={{ fontSize: 12, color: '#888', display: 'block', marginBottom: 8 }}>
        Zaoblení rohů: {tweaks.borderRadius}px
      </label>
      <input type="range" min={0} max={16} step={2} value={tweaks.borderRadius}
        onChange={e => update('borderRadius', Number(e.target.value))}
        style={{ width: '100%', marginBottom: 14, accentColor: tweaks.accentColor }} />

      <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: '#888', cursor: 'pointer' }}>
        <input type="checkbox" checked={tweaks.showStats} onChange={e => update('showStats', e.target.checked)}
          style={{ accentColor: tweaks.accentColor }} />
        Zobrazit statistiky
      </label>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksPanelVisible, setTweaksPanelVisible] = useState(false);

  useEffect(() => {
    // Register tweaks listener BEFORE signaling availability
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksPanelVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksPanelVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <>
      <Header tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <StatsBar tweaks={tweaks} />
      <About tweaks={tweaks} />
      <Services tweaks={tweaks} />
      <Members tweaks={tweaks} />
      <Projects tweaks={tweaks} />
      <PublicInfo tweaks={tweaks} />
      <Footer tweaks={tweaks} />
      <CookieBanner tweaks={tweaks} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksPanelVisible} />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
