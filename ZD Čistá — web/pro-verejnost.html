<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informace pro veřejnost — ZD Čistá u Mladé Boleslavi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A2A2A; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.js"></script>
<script type="text/babel">

const ProVerejnost = () => (
  <>
    <ZDHeader activePage="pro-verejnost.html" variant="light" />
    <ZDPageHero
      title="Informace pro veřejnost"
      subtitle="Zákonné povinnosti, provozní informace a kontaktní údaje ZD Čistá u Mladé Boleslavi."
    />

    {/* Kontaktní a identifikační info */}
    <section style={{ padding: '72px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Základní informace" title="ZD Čistá u Mladé Boleslavi" />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 20 }}>
          {[
            { icon: <IcoPin />, title: 'Sídlo', rows: ['Čistá 173', '294 23 Čistá u Mladé Boleslavi'] },
            { icon: <IcoPhone />, title: 'Telefon', rows: ['601 576 687'] },
            { icon: <IcoMail />, title: 'E-mail', rows: ['info@zdcista.cz'] },
            { icon: <IcoClock />, title: 'Úřední hodiny', rows: ['Pondělí – Pátek', '7:00 – 15:00'] },
          ].map((c, i) => (
            <div key={i} style={{ background: 'white', borderRadius: 14, padding: '24px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', display: 'flex', gap: 14, alignItems: 'flex-start' }}>
              <div style={{ color: ZD_COLORS.green, marginTop: 2, flexShrink: 0 }}>{c.icon}</div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 8 }}>{c.title}</div>
                {c.rows.map((r, j) => <div key={j} style={{ fontWeight: j === 0 ? 600 : 400, fontSize: 15, color: '#333', lineHeight: 1.6 }}>{r}</div>)}
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Identifikace */}
    <section style={{ padding: '0 24px 72px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ background: 'white', borderRadius: 14, padding: '28px 32px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 20 }}>Identifikační údaje</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 24 }}>
            {[
              ['IČO', '00105368'],
              ['DIČ', 'CZ00105368'],
              ['Právní forma', 'Zemědělské družstvo'],
              ['Rejstříkový soud', 'Krajský soud v Praze'],
              ['Kraj', 'Středočeský'],
              ['Předseda', 'Tomáš Bartoš'],
            ].map(([k, v]) => (
              <div key={k}>
                <div style={{ fontSize: 11, color: '#aaa', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 4 }}>{k}</div>
                <div style={{ fontWeight: 600, fontSize: 15 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>

    {/* EET */}
    <section style={{ padding: '72px 24px', background: '#F0EBE1' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Zákonné povinnosti" title="Evidence tržeb (EET)" />
        <div style={{ background: 'white', borderRadius: 14, padding: '28px 32px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', maxWidth: 720 }}>
          <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
            <IcoInfo style={{ color: ZD_COLORS.green, flexShrink: 0, marginTop: 2 }} />
            <div>
              <p style={{ fontSize: 15, lineHeight: 1.8, color: '#444', marginBottom: 14 }}>
                Dle zákona o evidenci tržeb je prodávající povinen vystavit kupujícímu účtenku. Zároveň je povinen zaevidovat přijatou tržbu u správce daně online.
              </p>
              <p style={{ fontSize: 15, lineHeight: 1.8, color: '#444' }}>
                V případě technického výpadku pak nejpozději do 48 hodin.
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* Mapa */}
    <section style={{ padding: '72px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Poloha" title="Kde nás najdete" />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: 32, alignItems: 'start' }} className="resp-2col">
          <div>
            <div style={{ background: 'white', borderRadius: 14, padding: '24px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', marginBottom: 16 }}>
              <div style={{ fontWeight: 700, marginBottom: 8 }}>Adresa</div>
              <div style={{ fontSize: 15, color: '#555', lineHeight: 1.75 }}>Čistá 173<br />294 23 Čistá<br />u Mladé Boleslavi</div>
            </div>
            <div style={{ background: 'white', borderRadius: 14, padding: '24px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
              <div style={{ fontWeight: 700, marginBottom: 8 }}>Jak se dostat</div>
              <div style={{ fontSize: 14, color: '#666', lineHeight: 1.75 }}>
                Cca 15 km severovýchodně od Mladé Boleslavi. Areál se nachází v centru obce Čistá.
              </div>
              <a href="https://www.google.cz/maps/@50.476478,14.844644,3a,75y" target="_blank" rel="noopener noreferrer"
                style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginTop: 14, fontSize: 13, fontWeight: 600, color: ZD_COLORS.green, textDecoration: 'none' }}>
                <IcoMap /> Otevřít v Google Maps
              </a>
            </div>
          </div>
          {/* Map placeholder */}
          <ZDImg label={"mapa / Google Maps embed\nČistá u Mladé Boleslavi"} style={{ height: 320, borderRadius: 14, background: 'linear-gradient(135deg, #b8c8a0 0%, #8aa060 100%)' }} />
        </div>
      </div>
    </section>

    {/* Veřejné dokumenty */}
    <section style={{ padding: '72px 24px', background: '#F0EBE1' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Ke stažení" title="Veřejně dostupné dokumenty" />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxWidth: 600 }}>
          {[
            { name: 'Stanovy ZD Čistá — veřejná verze', typ: 'PDF' },
            { name: 'Výpis z obchodního rejstříku', typ: 'Odkaz' },
          ].map((d, i) => (
            <div key={i} style={{ background: 'white', borderRadius: 10, padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 12, boxShadow: '0 2px 8px rgba(0,0,0,0.05)', border: '1px solid #e8e0d4' }}>
              <IcoDoc style={{ color: ZD_COLORS.green }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{d.name}</div>
                <div style={{ fontSize: 12, color: '#aaa', marginTop: 2 }}>{d.typ}</div>
              </div>
              <button style={{ padding: '7px 14px', background: ZD_COLORS.green, color: 'white', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}>
                <IcoDown /> Stáhnout
              </button>
            </div>
          ))}
        </div>
      </div>
    </section>

    <ZDCtaSection />
    <ZDFooter />
    <style>{`@media(max-width:768px){.resp-2col{grid-template-columns:1fr!important}}`}</style>
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<ProVerejnost />);
</script>
</body>
</html>
