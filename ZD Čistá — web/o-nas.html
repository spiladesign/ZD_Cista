<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O nás — ZD Čistá u Mladé Boleslavi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A2A2A; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.js"></script>
<script type="text/babel">

const hodnoty = [
  { icon: <IcoLeaf />, title: 'Udržitelnost', desc: 'Hospodaříme s ohledem na krajinu a životní prostředí. Minimalizujeme negativní dopady zemědělské výroby.' },
  { icon: <IcoTractor />, title: 'Moderní technologie', desc: 'Investujeme do nové techniky a moderních postupů, které zvyšují efektivitu a snižují provozní náklady.' },
  { icon: <IcoPeople />, title: 'Komunita', desc: 'Jsme součástí obce Čistá a aktivně přispíváme k rozvoji místní komunity a regionu Mladoboleslavska.' },
  { icon: <IcoWheat />, title: 'Tradice', desc: 'Navazujeme na desetiletí zkušeností a respektujeme zemědělské tradice regionu Středočeského kraje.' },
];

const timeline = [
  { year: '1950', text: 'Založení zemědělského družstva v obci Čistá u Mladé Boleslavi.' },
  { year: '60.–70. léta', text: 'Rozvoj rostlinné a živočišné výroby, budování zázemí a infrastruktury areálu.' },
  { year: '1989+', text: 'Transformace po roce 1989, přizpůsobení tržnímu prostředí a modernizace hospodaření.' },
  { year: '2000+', text: 'Postupná modernizace strojového parku, investice do udržitelného zemědělství.' },
  { year: 'Dnes', text: 'Hospodaříme na zemědělské půdě v okolí Čisté, zaměřujeme se na rostlinnou i živočišnou výrobu.' },
];

const Onas = () => (
  <>
    <ZDHeader activePage="o-nas.html" variant="light" />
    <ZDPageHero
      title="O nás"
      subtitle="Zemědělské družstvo Čistá u Mladé Boleslavi hospodaří ve Středočeském kraji od roku 1950."
    />

    {/* Profil */}
    <section style={{ padding: '80px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 72, alignItems: 'center' }} className="resp-2col">
        <div>
          <ZDSectionHead eyebrow="Kdo jsme" title="Profil družstva" />
          <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555', marginBottom: 20 }}>
            Zemědělské družstvo Čistá u Mladé Boleslavi je zemědělský podnik se sídlem v obci Čistá ve Středočeském kraji. Zabýváme se výrobou rostlinných a živočišných produktů.
          </p>
          <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555', marginBottom: 20 }}>
            Naším cílem je efektivní a udržitelné hospodaření, které respektuje přírodu i potřeby místní komunity. Pracujeme s moderní technikou a využíváme nejnovější poznatky v oblasti zemědělství.
          </p>
          <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555' }}>
            Družstvo sdružuje členy, kteří se podílejí na jeho řízení prostřednictvím valné hromady a volených orgánů — představenstva a kontrolní komise.
          </p>
        </div>
        <ZDImg label={"fotografie:\naréál ZD Čistá,\nadministrativní budova"} style={{ height: 420, borderRadius: 16, background: 'linear-gradient(135deg, #8a9a70 0%, #4a6a30 100%)' }} />
      </div>
    </section>

    {/* Timeline */}
    <section style={{ padding: '80px 24px', background: '#F0EBE1' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Historie" title="Od roku 1950" />
        <div style={{ position: 'relative', paddingLeft: 32 }}>
          <div style={{ position: 'absolute', left: 8, top: 0, bottom: 0, width: 2, background: `linear-gradient(to bottom, ${ZD_COLORS.green}, ${ZD_COLORS.wheat})`, borderRadius: 1 }} />
          {timeline.map((item, i) => (
            <div key={i} style={{ position: 'relative', marginBottom: 36, paddingLeft: 24 }}>
              <div style={{ position: 'absolute', left: -28, top: 4, width: 12, height: 12, borderRadius: '50%', background: i === timeline.length - 1 ? ZD_COLORS.wheat : ZD_COLORS.green, border: '2px solid white', boxShadow: '0 0 0 2px ' + (i === timeline.length - 1 ? ZD_COLORS.wheat : ZD_COLORS.green) }} />
              <div style={{ fontSize: 13, fontWeight: 700, color: ZD_COLORS.green, letterSpacing: '0.5px', marginBottom: 6 }}>{item.year}</div>
              <p style={{ fontSize: 15, color: '#555', lineHeight: 1.7 }}>{item.text}</p>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Hodnoty */}
    <section style={{ padding: '80px 24px', background: '#FAF7F2' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Naše hodnoty" title="Co nás definuje" center />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 20 }}>
          {hodnoty.map((h, i) => (
            <div key={i} style={{ background: 'white', borderRadius: 14, padding: '28px 24px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', borderTop: `3px solid ${ZD_COLORS.wheat}` }}>
              <div style={{ color: ZD_COLORS.green, marginBottom: 14 }}>{h.icon}</div>
              <h3 style={{ fontSize: 17, fontWeight: 700, marginBottom: 10 }}>{h.title}</h3>
              <p style={{ fontSize: 14, color: '#666', lineHeight: 1.7 }}>{h.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* Vedení */}
    <section style={{ padding: '80px 24px', background: `linear-gradient(135deg, ${ZD_COLORS.green}, #1a3009)`, color: 'white' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <ZDSectionHead eyebrow="Vedení" title="Představenstvo" light />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: 20, maxWidth: 700 }}>
          {[
            { jmeno: 'Tomáš Bartoš', funkce: 'Předseda představenstva', kontakt: 'info@zdcista.cz' },
            { jmeno: 'Členové představenstva', funkce: 'Voleni členskou schůzí', kontakt: null },
          ].map((o, i) => (
            <div key={i} style={{ background: 'rgba(255,255,255,0.1)', borderRadius: 14, padding: '28px 24px', border: '1px solid rgba(255,255,255,0.15)' }}>
              <ZDImg label={"foto:\n" + o.jmeno} style={{ height: 80, width: 80, borderRadius: '50%', marginBottom: 16, background: 'rgba(255,255,255,0.15)' }} />
              <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 4 }}>{o.jmeno}</div>
              <div style={{ fontSize: 13, color: ZD_COLORS.wheat, marginBottom: o.kontakt ? 12 : 0 }}>{o.funkce}</div>
              {o.kontakt && <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)' }}>{o.kontakt}</div>}
            </div>
          ))}
        </div>
      </div>
    </section>

    <ZDCtaSection title="Chcete se dozvědět více?" subtitle="Neváhejte nás kontaktovat. Rádi vám poskytneme informace o hospodaření a aktivitách ZD Čistá." />
    <ZDFooter />

    <style>{`.resp-2col { @media (max-width:768px) { grid-template-columns: 1fr !important; } }`}</style>
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Onas />);
</script>
</body>
</html>
