<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naše činnost — ZD Čistá u Mladé Boleslavi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #FAF7F2; color: #2A2A2A; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.js"></script>
<script type="text/babel">

const rostlinnaPlodiny = [
  { name: 'Pšenice ozimá', desc: 'Hlavní obilovinová plodina, základ rostlinné výroby.' },
  { name: 'Řepka ozimá', desc: 'Olejnina pěstovaná pro průmyslové účely.' },
  { name: 'Ječmen jarní', desc: 'Krmná i sladovnická plodina.' },
  { name: 'Kukuřice', desc: 'Silážní kukuřice pro krmné účely.' },
  { name: 'Tritikale', desc: 'Krmná obilovino-žitná plodina.' },
  { name: 'Slunečnice', desc: 'Olejnina doplňující osevní postup.' },
];

const Cinnost = () => (
  <>
    <ZDHeader activePage="cinnost.html" variant="light" />
    <ZDPageHero
      title="Naše činnost"
      subtitle="Zabýváme se výrobou rostlinných a živočišných produktů na zemědělské půdě Středočeského kraje."
    />

    {/* ROSTLINNÁ VÝROBA */}
    <section style={{ padding: '80px 24px', background: '#FAF7F2' }} id="rostlinna">
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 72, alignItems: 'center', marginBottom: 56 }} className="resp-2col">
          <div>
            <ZDSectionHead eyebrow="Rostlinná výroba" title="Pěstujeme obiloviny a olejniny" />
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555', marginBottom: 20 }}>
              Rostlinná výroba tvoří základ hospodaření ZD Čistá. Pěstujeme obiloviny, olejniny a krmné plodiny na zemědělské půdě v okolí obce Čistá u Mladé Boleslavi.
            </p>
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555', marginBottom: 28 }}>
              Využíváme moderní zemědělskou techniku a agrotechnické postupy, které umožňují dosahovat dobrých výnosů při šetrném přístupu k půdě a krajině.
            </p>
            <div style={{ display: 'flex', gap: 20 }}>
              {[['850 ha', 'obhospodařované plochy'], ['6+', 'druhů plodin']].map(([v, l]) => (
                <div key={l} style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 32, fontWeight: 800, color: ZD_COLORS.green, letterSpacing: '-1px' }}>{v}</div>
                  <div style={{ fontSize: 12, color: '#888', textTransform: 'uppercase', letterSpacing: '0.5px', marginTop: 4 }}>{l}</div>
                </div>
              ))}
            </div>
          </div>
          <ZDImg label={"fotografie:\npole obilovin\nnebo kombajn při sklizni"} style={{ height: 400, borderRadius: 16, background: 'linear-gradient(135deg, #c8b050 0%, #7a6820 100%)' }} />
        </div>

        {/* Plodiny grid */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: ZD_COLORS.green, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: 18 }}>Pěstované plodiny</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 14 }}>
            {rostlinnaPlodiny.map((p, i) => (
              <div key={i} style={{ background: 'white', borderRadius: 12, padding: '18px 20px', boxShadow: '0 2px 10px rgba(0,0,0,0.05)', borderLeft: `3px solid ${ZD_COLORS.wheat}` }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 6 }}>{p.name}</div>
                <div style={{ fontSize: 13, color: '#777', lineHeight: 1.6 }}>{p.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>

    {/* ŽIVOČIŠNÁ VÝROBA */}
    <section style={{ padding: '80px 24px', background: '#F0EBE1' }} id="zivocisna">
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 72, alignItems: 'center' }} className="resp-2col">
          <ZDImg label={"fotografie:\nustájení nebo\nskot v areálu"} style={{ height: 400, borderRadius: 16, background: 'linear-gradient(135deg, #8faa70 0%, #4a7030 100%)' }} />
          <div>
            <ZDSectionHead eyebrow="Živočišná výroba" title="Chov hospodářských zvířat" />
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555', marginBottom: 20 }}>
              Živočišná výroba je nedílnou součástí hospodaření ZD Čistá. Chov probíhá ve vlastních ustájovacích zařízeních v areálu družstva v obci Čistá.
            </p>
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#555', marginBottom: 28 }}>
              Produkce živočišných produktů navazuje na rostlinnou výrobu — krmné plodiny jsou využívány přímo v chovu. Tento integrovaný přístup přispívá k efektivnímu a udržitelnému hospodaření.
            </p>
            <div style={{ background: 'white', borderRadius: 12, padding: '18px 20px', fontSize: 14, color: '#555', lineHeight: 1.7, border: '1px solid #e8e0d4' }}>
              Podrobnější informace o živočišné výrobě poskytneme na vyžádání. Kontaktujte nás telefonicky nebo e-mailem.
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* Technika */}
    <section style={{ padding: '80px 24px', background: `linear-gradient(135deg, ${ZD_COLORS.green} 0%, #1a3009 100%)`, color: 'white' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', textAlign: 'center' }}>
        <ZDSectionHead eyebrow="Vybavení" title="Moderní zemědělská technika" light center />
        <p style={{ fontSize: 16, color: 'rgba(255,255,255,0.72)', lineHeight: 1.75, maxWidth: 620, margin: '0 auto 48px' }}>
          Hospodaříme s moderní zemědělskou technikou, která umožňuje efektivní a šetrné hospodaření. Strojový park průběžně obnovujeme a rozšiřujeme.
        </p>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16, maxWidth: 900, margin: '0 auto' }}>
          {['Traktory', 'Kombajny', 'Secí stroje', 'Postřikovače', 'Sklízecí technika', 'Manipulační technika'].map((t, i) => (
            <div key={i} style={{ background: 'rgba(255,255,255,0.1)', borderRadius: 10, padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 10, border: '1px solid rgba(255,255,255,0.12)' }}>
              <div style={{ color: ZD_COLORS.wheat }}><IcoTractor /></div>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </section>

    <ZDCtaSection title="Máte zájem o spolupráci?" subtitle="Kontaktujte nás pro více informací o naší zemědělské výrobě a možnostech spolupráce." />
    <ZDFooter />
    <style>{`@media(max-width:768px){.resp-2col{grid-template-columns:1fr!important}}`}</style>
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Cinnost />);
</script>
</body>
</html>
